{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if section.id else 'New' }} Academic Section{% endblock %}
{% block content %}
<div class="admin-header">
    <h1><i class="fa-solid fa-users"></i> {{ 'Edit' if section.id else 'New' }} Academic Section</h1>
    <a href="{{ url_for('academic_structure.academic_sections') }}" class="btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>
</div>

<div class="panel">
    <form method="POST">
        <div class="form-group">
            <label for="academic_class_id">Academic Class</label>
            <select id="academic_class_id" name="academic_class_id" required>
                {% for cls in classes %}
                <option value="{{ cls.id }}" {% if section.academic_class_id == cls.id %}selected{% endif %}>
                    {{ cls.academic_level.name }} - {{ cls.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="name">Section Name</label>
            <input type="text" id="name" name="name" value="{{ section.name or '' }}" required>
            <small>e.g., A, B, C, etc.</small>
        </div>
        
        <div class="form-group">
            <label for="sort_order">Sort Order</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ section.sort_order or 0 }}">
            <small>Lower numbers appear first within the class</small>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if section.is_active or not section.id %}checked{% endif %}>
                Active
            </label>
        </div>
        
        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-save"></i> Save Section
        </button>
    </form>
</div>
{% endblock %}

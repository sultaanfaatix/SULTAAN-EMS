{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if level.id else 'New' }} Academic Level{% endblock %}
{% block content %}
<div class="admin-header">
    <h1><i class="fa-solid fa-layer-group"></i> {{ 'Edit' if level.id else 'New' }} Academic Level</h1>
    <a href="{{ url_for('academic_structure.academic_levels') }}" class="btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>
</div>

<div class="panel">
    <form method="POST">
        <div class="form-group">
            <label for="name">Level Name</label>
            <input type="text" id="name" name="name" value="{{ level.name or '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="sort_order">Sort Order</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ level.sort_order or 0 }}">
            <small>Lower numbers appear first</small>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if level.is_active or not level.id %}checked{% endif %}>
                Active
            </label>
        </div>
        
        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-save"></i> Save Level
        </button>
    </form>
</div>
{% endblock %}

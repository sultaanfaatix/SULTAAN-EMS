{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if cls.id else 'New' }} Academic Class{% endblock %}
{% block content %}
<div class="admin-header">
    <h1><i class="fa-solid fa-graduation-cap"></i> {{ 'Edit' if cls.id else 'New' }} Academic Class</h1>
    <a href="{{ url_for('academic_structure.academic_classes') }}" class="btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>
</div>

<div class="panel">
    <form method="POST">
        <div class="form-group">
            <label for="academic_level_id">Academic Level</label>
            <select id="academic_level_id" name="academic_level_id" required>
                {% for level in levels %}
                <option value="{{ level.id }}" {% if cls.academic_level_id == level.id %}selected{% endif %}>
                    {{ level.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="name">Class Name</label>
            <input type="text" id="name" name="name" value="{{ cls.name or '' }}" required>
            <small>e.g., Grade 1, Form 2, etc.</small>
        </div>
        
        <div class="form-group">
            <label for="sort_order">Sort Order</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ cls.sort_order or 0 }}">
            <small>Lower numbers appear first within the level</small>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if cls.is_active or not cls.id %}checked{% endif %}>
                Active
            </label>
        </div>
        
        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-save"></i> Save Class
        </button>
    </form>
</div>
{% endblock %}

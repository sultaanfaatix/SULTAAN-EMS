{% extends "base.html" %}
{% block body_class %}login-body{% endblock %}
{% block content %}
<main class="login-page">
  <form method="post" class="login-card glass-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="login-mark"><i class="fa-solid fa-key"></i></div>
    <span class="eyebrow"><i class="fa-solid fa-unlock-keyhole"></i> Password Reset</span>
    <h1>Teacher Portal</h1>
    <p>Enter your username. Your request will be logged and the school administrator can reset your password.</p>
    <label><i class="fa-solid fa-user"></i> Username<input name="username" required autofocus></label>
    <button type="submit" class="premium"><i class="fa-solid fa-paper-plane"></i> Submit Request</button>
    <p style="margin:0;text-align:center;"><a href="{{ url_for('teacher_portal.login') }}">Back to login</a></p>
  </form>
</main>
{% endblock %}
